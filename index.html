<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic+Coding&display=swap" rel="stylesheet">
    <title>Music</title>
    <style>
       
        body {
             font-family: "Nanum Gothic Coding", monospace;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

 
        h1 {
            font-size: 4vw; /* Base font size adjusts with viewport width */
            color: #333;
            margin: 0;
        }

        /* Responsive Design for smaller devices */
        @media (max-width: 768px) {
            h1 {
                font-size: 6vw; /* Larger font size for tablets */
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 8vw; /* Even larger font size for mobile */
            }
        }
    </style>
</head>
<body>

    <h1>Music</h1>

</body>
</html>
